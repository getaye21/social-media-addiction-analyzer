name: Deploy to Hugging Face

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      
      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Clone the Hugging Face Space using token
          git clone https://user:$HF_TOKEN@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/ml-image-classifier
          
      - name: Copy files to Hugging Face Space
        run: |
          # Copy all files except .git folder
          rsync -av --exclude='.git' ./ ml-image-classifier/
          
      - name: Commit and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd ml-image-classifier
          git add .
          git commit -m "Deploy from GitHub: $(date)"
          git push https://user:$HF_TOKEN@huggingface.co/spaces/${{ secrets.HF_USERNAME }}/ml-image-classifier main
