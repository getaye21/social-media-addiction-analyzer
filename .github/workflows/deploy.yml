name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        uses: huggingface/github-action@v1
        with:
          factory-id: Getaye/social-media-addiction-analyzer
          repo-type: space
          token: ${{ secrets.HF_TOKEN }}
