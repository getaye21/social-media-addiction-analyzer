name: Deploy to Hugging Face

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      
      - name: Deploy to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git to use the token for authentication
          git config --global credential.helper store
          echo "https://Getaye:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          
          # Clone the space
          git clone https://huggingface.co/spaces/Getaye/social-media-addiction-analyzer temp
          
          # Copy files (excluding .git)
          rsync -av --delete --exclude='.git' --exclude='.github' --exclude='temp' ./ temp/
          
          # Commit and push
          cd temp
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy from GitHub: $(date)"
            git push
            echo "✅ Deployed successfully!"
          fi
