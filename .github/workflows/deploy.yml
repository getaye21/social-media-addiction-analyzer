name: Simple Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Clone with token
          echo "Cloning with token..."
          git clone https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer temp_space
          
          # Copy files
          cp -r * temp_space/ 2>/dev/null || true
          cp -r .env* temp_space/ 2>/dev/null || true
          
          # Commit and push
          cd temp_space
          git add .
          git commit -m "Deploy from GitHub" || echo "No changes"
          
          # Force push with token in URL
          git push https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer main --force
