name: Deploy to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          path: source-code
      
      - name: Deploy to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Create a fresh directory
          mkdir deploy
          cd deploy
          
          # Initialize new git repo
          git init
          
          # Copy ALL files from source (excluding .git)
          cp -rf ../source-code/* .
          cp -rf ../source-code/.env* . 2>/dev/null || true
          
          # Add HF remote
          git remote add origin https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer
          
          # Commit and push
          git add .
          git commit -m "Deploy from GitHub: $(date)"
          git push origin main --force
