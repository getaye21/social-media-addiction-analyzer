name: Deploy to Hugging Face

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      
      - name: Debug - Show token first 4 chars (safely)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Token starts with: ${HF_TOKEN:0:4}..."
          echo "Token length: ${#HF_TOKEN}"
      
      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Cloning with token..."
          git clone https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer temp_space
          if [ $? -eq 0 ]; then
            echo "✅ Clone successful!"
          else
            echo "❌ Clone failed!"
            exit 1
          fi
          
      - name: Copy files to Hugging Face Space
        run: |
          echo "Copying files..."
          rsync -av --delete --exclude='.git' --exclude='.github' --exclude='temp_space' ./ temp_space/
          
      - name: Commit and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd temp_space
          git add .
          
          # Show current remote URL
          echo "Current remote URL:"
          git remote -v
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy from GitHub: $(date)"
            
            # FORCE update the remote URL with token
            git remote set-url origin https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer
            
            echo "New remote URL:"
            git remote -v
            
            echo "Pushing..."
            git push origin main
            echo "✅ If you see this, push succeeded!"
          fi
