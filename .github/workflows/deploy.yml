name: Deploy to Hugging Face

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      
      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Cloning with token: ${HF_TOKEN:0:4}..."
          git clone https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer temp_space
          
      - name: Copy files to Hugging Face Space
        run: |
          rsync -av --delete --exclude='.git' --exclude='.github' --exclude='temp_space' ./ temp_space/
          
      - name: Commit and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd temp_space
          git add .
          
          echo "Token available: ${HF_TOKEN:0:4}..."
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy from GitHub: $(date)"
            
            # DIRECT PUSH WITH TOKEN IN URL
            echo "Pushing to Hugging Face..."
            git push https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer main
            
            if [ $? -eq 0 ]; then
              echo "✅ Deployed successfully!"
            else
              echo "❌ Push failed!"
              exit 1
            fi
          fi
