name: Deploy to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allows manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          echo "🚀 Cloning current HF Space..."
          git clone https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer temp
          
          echo "📋 Copying new files..."
          cp -rf * temp/ 2>/dev/null || true
          cp -rf .env* temp/ 2>/dev/null || true
          
          echo "💾 Pushing changes..."
          cd temp
          git add .
          git commit -m "Deploy from GitHub: $(date)" || echo "No changes"
          git push https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer main --force
          
          echo "✅ Deployment complete!"
