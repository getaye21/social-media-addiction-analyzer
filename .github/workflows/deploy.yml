name: Deploy to Hugging Face

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      
      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # URL-encode the token to handle special characters
          ENCODED_TOKEN=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$HF_TOKEN'))")
          echo "Cloning with encoded token..."
          git clone https://Getaye:${ENCODED_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer temp_space
          
      - name: Copy files to Hugging Face Space
        run: |
          rsync -av --delete --exclude='.git' --exclude='.github' --exclude='temp_space' ./ temp_space/
          
      - name: Commit and push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd temp_space
          git add .
          
          # URL-encode the token for push
          ENCODED_TOKEN=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$HF_TOKEN'))")
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Deploy from GitHub: $(date)"
            
            echo "Pushing with encoded token..."
            git push https://Getaye:${ENCODED_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer main
            
            if [ $? -eq 0 ]; then
              echo "✅ Deployed successfully!"
            else
              echo "❌ Push failed!"
              exit 1
            fi
          fi
