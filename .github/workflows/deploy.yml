name: Sync to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Upload to Hugging Face Space
        uses: huggingface/hub-actions/upload@main
        with:
          token: ${{ secrets.github-deploy }}
          repo_id: Getaye/social-media-addiction-analyzer
          repo_type: space
          path: .
