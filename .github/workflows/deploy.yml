name: Deploy to Hugging Face

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
      
      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Create a temporary directory
          mkdir deploy
          cd deploy
          
          # Initialize a new git repository
          git init
          
          # Copy all files from the original repo (excluding .git)
          rsync -av --exclude='.git' ../ ./ 
          
          # Add everything
          git add .
          git commit -m "Deploy from GitHub Actions"
          
          # Force push to Hugging Face using token in URL
          # This is the KEY - we construct the URL carefully
          REPO_URL="https://Getaye:${HF_TOKEN}@huggingface.co/spaces/Getaye/social-media-addiction-analyzer"
          
          # Add remote and push
          git remote add origin $REPO_URL
          git branch -M main
          git push -u origin main --force
          
          echo "✅ Deployed successfully!"
