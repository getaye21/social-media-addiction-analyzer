name: Deploy to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.deploy_token }}  # Using your existing token
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          echo "🚀 Deploying using deploy_token..."
          echo "Token length: ${#HF_TOKEN} characters"
          
          # Push directly to Hugging Face
          git push https://Getaye:$HF_TOKEN@huggingface.co/spaces/Getaye/social-media-addiction-analyzer main --force
          
          echo "✅ Push complete! Check your Space in 2-3 minutes"
