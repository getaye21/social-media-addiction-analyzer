name: Deploy to Hugging Face (SSH)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.HF_SSH_KEY }}

      - name: Add Hugging Face to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan hf.co >> ~/.ssh/known_hosts

      - name: Deploy to Hugging Face Space
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          echo "🚀 Cloning space via SSH..."
          # Use the SSH URL format: git@hf.co:spaces/username/space-name
          git clone git@hf.co:spaces/Getaye/social-media-addiction-analyzer temp_space
          
          echo "📋 Copying files..."
          rsync -av --delete --exclude='.git' --exclude='.github' --exclude='temp_space' ./ temp_space/
          
          cd temp_space
          git add .
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "✨ No changes to deploy."
          else
            git commit -m "Deploy from GitHub Actions on $(date)"
            echo "📤 Pushing via SSH..."
            git push
            echo "✅ Deployment successful via SSH!"
          fi
